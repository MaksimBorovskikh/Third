
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Монитор группы</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f4f8; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .card { background: white; border-radius: 15px; padding: 25px; width: 450px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 30px; }
        h2 { margin-top: 0; font-size: 1.4rem; font-weight: bold; }
        #myInfo { margin-bottom: 20px; color: #333; }
        
        .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button { border: 1px solid rgba(0,0,0,0.1); border-radius: 8px; padding: 12px; color: white; cursor: pointer; font-weight: bold; font-size: 14px; }
        
        /* Стили кнопок со скриншота */
        .btn-study { background-color: #2e7d32; }
        .btn-coffee { background-color: #ffc107; color: black; }
        .btn-game { background-color: #0097a7; }
        .btn-home { background-color: #546e7a; }

        .user-item { display: flex; align-items: center; padding: 15px 0; border-bottom: 1px solid #f0f0f0; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 15px; background: #ffc107; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Мой профиль</h2>
        <div id="myInfo">Загрузка...</div>
        <div class="buttons">
            <button class="btn-study" onclick="window.changeStatus('📚 Учусь')">📚 Учусь</button>
            <button class="btn-coffee" onclick="window.changeStatus('☕ Кофе')">☕ Кофе</button>
            <button class="btn-game" onclick="window.changeStatus('🎮 В игре')">🎮 В игре</button>
            <button class="btn-home" onclick="window.changeStatus('🏠 Дома')">🏠 Дома</button>
        </div>
    </div>

    <div class="card">
        <h2>Монитор группы</h2>
        <div id="grouplist"></div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const URL = 'https://nuuxptfjgedosnlzlzvo.supabase.co';
        const KEY = 'sb_publishable_lPJB0WiAJY75hB0eD2ltnA_0KLJO41H';
        const supabase = createClient(URL, KEY);

        const MY_ID = '4bc5694e-89f8-47d9-9b60-2d3bd2439122';

        window.changeStatus = async (text) => {
            const { error } = await supabase
                .from('profiles')
                .update({ status: text })
                .eq('id', MY_ID);

            if (error) {
                alert("Ошибка! Проверьте RLS политики в Supabase.");
                console.error(error);
            } else {
                fetchGroup();
            }
        };

        async function fetchGroup() {
            const { data, error } = await supabase
                .from('profiles')
                .select('*')
                .order('username', { ascending: true });

            if (error) return console.error(error);

            const list = document.getElementById('grouplist');
            list.innerHTML = data.map(user => `
                <div class="user-item">
                    <div class="status-dot"></div>
                    <div style="flex-grow: 1;">
                        <strong>${user.username}</strong><br>
                        <small style="color: #666;">${user.status || 'Статус не задан'}</small>
                    </div>
                </div>
            `).join('');

            const me = data.find(u => u.id === MY_ID);
            if (me) document.getElementById('myInfo').innerText = `Вы зашли как: ${me.username}`;
        }

        fetchGroup();
        setInterval(fetchGroup, 5000);
    </script>
</body>
</html>
